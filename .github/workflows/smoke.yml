name: smoke

# PR-triggered smoke build. Builds the image without pushing so a broken
# Dockerfile or a skill install failure shows up in review before the
# change lands on main. Build cache is shared with release.yml.

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "VERSION"
      - "scripts/**"
      - "hooks/**"
      - ".github/workflows/smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main repo
        uses: actions/checkout@v4
        # Built-in GITHUB_TOKEN for main repo; cross-org PAT for submodule.

      - name: Initialize private submodule with cross-org PAT
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          git config --global \
            url."https://github.com/".insteadOf \
            "git@github.com:"
          git submodule update --init --recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            IMAGE_VERSION=smoke-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
