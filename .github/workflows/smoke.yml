name: smoke

# PR-triggered smoke build. Builds the image without pushing so a broken
# Dockerfile or a skill install failure shows up in review before the
# change lands on main. Build cache is shared with release.yml.

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "VERSION"
      - "scripts/**"
      - "hooks/**"
      - ".github/workflows/smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_READ_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            IMAGE_VERSION=smoke-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
