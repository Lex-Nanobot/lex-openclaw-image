name: release

# Tag-triggered release. Pushing a tag shaped v<semver> (e.g. v0.1.0)
# builds + pushes the image to GHCR with two tags: v<semver> and latest.
# The VERSION file must match the git tag or the workflow fails fast.
#
# Consumers in lex-platform pin by IMMUTABLE DIGEST, not tag. The tag is
# for humans + release notes; the digest is what actually goes into
# Instance.image_digest.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main repo
        uses: actions/checkout@v4
        # No token override → uses the built-in GITHUB_TOKEN, which has
        # access to this repo (Lex-Nanobot/lex-openclaw-image). The
        # cross-org submodule (Deku-Studios/lex-telemetry) is fetched
        # in the next step with its own narrow PAT. Splitting this way
        # means SUBMODULE_READ_TOKEN only needs access to the submodule
        # repo — not to this repo, whose org doesn't share its FGPAT
        # configuration.

      - name: Initialize private submodule with cross-org PAT
        env:
          SUBMODULE_TOKEN: ${{ secrets.SUBMODULE_READ_TOKEN }}
        run: |
          git config --global \
            url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          # Rewrite any SSH submodule URLs (our .gitmodules uses
          # git@github.com:...) to HTTPS so the token rewrite above takes
          # effect. Safe to re-run; no-op if already HTTPS.
          git config --global \
            url."https://github.com/".insteadOf \
            "git@github.com:"
          git submodule update --init --recursive

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"        # v0.1.0
          VERSION="${TAG#v}"                    # 0.1.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches git tag
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$FILE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error ::VERSION file ($FILE_VERSION) does not match git tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/lex-nanobot/lex-openclaw-image:${{ steps.version.outputs.tag }}
            ghcr.io/lex-nanobot/lex-openclaw-image:latest
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
          # Use the GHA cache so unchanged upper layers don't get rebuilt
          # every release — the Chromium + npm-globals layers are large.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Emit release summary
        run: |
          {
            echo "## Release: ${{ steps.version.outputs.tag }}"
            echo ""
            echo "**Pushed tags:**"
            echo "- \`ghcr.io/lex-nanobot/lex-openclaw-image:${{ steps.version.outputs.tag }}\`"
            echo "- \`ghcr.io/lex-nanobot/lex-openclaw-image:latest\`"
            echo ""
            echo "**Immutable digest:**"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.build.outputs.digest }}"
            echo "\`\`\`"
            echo ""
            echo "Pin this digest into \`Instance.image_digest\` for reproducible deploys."
            echo "Tag mutation after freeze cannot reskin instances pinned to this digest."
          } >> "$GITHUB_STEP_SUMMARY"
