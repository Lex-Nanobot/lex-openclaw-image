name: release

# Tag-triggered release. Pushing a tag shaped v<semver> (e.g. v0.1.0)
# builds + pushes the image to GHCR with two tags: v<semver> and latest.
# The VERSION file must match the git tag or the workflow fails fast.
#
# Consumers in lex-platform pin by IMMUTABLE DIGEST, not tag. The tag is
# for humans + release notes; the digest is what actually goes into
# Instance.image_digest.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # SUBMODULE_READ_TOKEN is a fine-grained PAT with "Contents: Read"
          # on Deku-Studios/lex-telemetry (and any other private submodule
          # this repo later picks up). The default GITHUB_TOKEN only sees
          # the current repo, which breaks private-submodule checkouts.
          token: ${{ secrets.SUBMODULE_READ_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"        # v0.1.0
          VERSION="${TAG#v}"                    # 0.1.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches git tag
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ "$FILE_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error ::VERSION file ($FILE_VERSION) does not match git tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/deku-studios/lex-openclaw-image:${{ steps.version.outputs.tag }}
            ghcr.io/deku-studios/lex-openclaw-image:latest
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.version }}
          # Use the GHA cache so unchanged upper layers don't get rebuilt
          # every release — the Chromium + npm-globals layers are large.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Emit release summary
        run: |
          {
            echo "## Release: ${{ steps.version.outputs.tag }}"
            echo ""
            echo "**Pushed tags:**"
            echo "- \`ghcr.io/deku-studios/lex-openclaw-image:${{ steps.version.outputs.tag }}\`"
            echo "- \`ghcr.io/deku-studios/lex-openclaw-image:latest\`"
            echo ""
            echo "**Immutable digest:**"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.build.outputs.digest }}"
            echo "\`\`\`"
            echo ""
            echo "Pin this digest into \`Instance.image_digest\` for reproducible deploys."
            echo "Tag mutation after freeze cannot reskin instances pinned to this digest."
          } >> "$GITHUB_STEP_SUMMARY"
